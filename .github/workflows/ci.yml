name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CGO_ENABLED: "0" # 部署用纯静态二进制(modernc sqlite),CI 同口径

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (default)
        run: go test ./...

      # fleet 模块在 //go:build fleet 后,默认构建不编译;单独覆盖。
      - name: go build (fleet)
        run: go build -tags fleet ./...

      - name: go test (fleet)
        run: go test -tags fleet ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
